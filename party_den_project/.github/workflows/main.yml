name: Secure Docker Publish

on:
  push:
    branches: [ "main" ]

jobs:
  test-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13' # Matches your project environment

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Security Scan (Bandit)
        run: |
          pip install bandit
          # Scans the project while excluding virtual environments
          bandit -r . -x ./venv,__pycache__

      - name: Run Tests
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: |
          python manage.py test

  build-and-push:
    needs: test-and-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image locally for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true # Saves image locally for Trivy to scan
          tags: ${{ secrets.DOCKER_USERNAME }}/party-den:latest

      - name: Scan Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/party-den:latest'
          format: 'table'
          exit-code: '1' # Fails the build if critical vulnerabilities are found
          severity: 'CRITICAL'

      - name: Push Image to Docker Hub
        if: success()
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/party-den:latest
